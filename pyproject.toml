#This file is used to package the AIPartImporter plugin.
#
#- It was generated by the InvenTree Plugin Creator tool - version 1.20.0
#- Ref: https://github.com/inventree/plugin_creator

[build-system]
requires = ["setuptools", "twine", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "inventree-ai-part-importer"
description = "Identify electronic components from a photo or text via an OpenAI-compatible AI endpoint, optionally enrich with official DigiKey/Mouser data, and import them into InvenTree after manual review."
dynamic = ["version"]
authors = [
    { name = "Your Name",email = "joarleyferreira@gmail.com" },
]
readme = "README.md"
license = "MIT"
keywords = ["inventree", "plugin"]
requires-python = ">=3.9"
dependencies = [
    "requests",
    "Pillow",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Framework :: InvenTree",
]
[project.urls]
Homepage = "https://github.com/joarley/inventree-ai-part-importer"

[project.entry-points."inventree_plugins"]
AIPartImporter = "ai_part_importer.core:AIPartImporter"

[tool.setuptools.packages.find]
where = [""]

[tool.setuptools.dynamic]
version = {attr = "ai_part_importer.PLUGIN_VERSION"} 

[tool.ruff]
exclude = [
    ".git",
    "__pycache__",
    "test.py",
    "tests",
    "venv",
    "env",
    ".venv",
    ".env",
]

src=["ai_part_importer"]
